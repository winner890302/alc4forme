[filter_remote]
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Apple/Apple.list, tag=苹果, force-policy=苹果服务, update-interval=-1, opt-parser=false, inserted-resource=true, enabled=true
